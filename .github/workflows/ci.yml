name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  host-test:
    name: host-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Show toolchain
        run: |
          uname -a
          gcc --version || true
          cc --version || true
          make --version | head -n 1

      - name: Build host
        run: make host

      - name: Run tests
        run: make test
