# .pipeline.yml — AI pipeline config for cl-amiga (a Common Lisp VM in C89/C99).
#
# Used by the ai-pipeline orchestrator (~/Development/MySources/ai-pipeline).
# Run manually:
#   <ai-pipeline>/bin/pipeline review|fix|test|all <this repo>

# C toolchain image (gcc + make), built FROM the base agent image so it still
# carries Claude Code + the entrypoint. See ai-pipeline/docker/c/Dockerfile.
image: ai-pipeline-agent-c:latest

# TEST stage command, run inside the container at /workspace.
#
# The test stage mounts the workspace READ-ONLY, but a C build writes object
# files and binaries. cl-amiga's Makefile derives every output path from
# BUILDDIR (the clamiga binary AND $(BUILDDIR)/tests/*), so we redirect it to
# /tmp/build — the exec-capable scratch tmpfs run-stage.sh provides — leaving
# the repo untouched. `test-fast` is the quick tier (skips the quicklisp/sento
# host-cold-test, which isn't available in the container anyway).
test_cmd: make BUILDDIR=/tmp/build/host test-fast

# Model the review/fix stages drive (sonnet | opus | haiku, or a full id).
model: sonnet
implement_model: opus

# max turn defaults, override if needed
# review_max_turns: 30
# fix_max_turns: 30
# implement_max_turns: 40
# analyze_max_turns: 50

# Bound how many times `pipeline all` may loop fix->test before giving up.
max_fix_retries: 2

# Project rules appended to the review/fix prompts (GC-safety, 32-bit-clean
# structs, C89/C99, HyperSpec, mandatory regression tests). Without this the
# generic prompt knows nothing about cl-amiga's invariants.
# review: auto-discovered at .pipeline/prompts/review-guideline.md (no key needed).
# fix: reuse the same rules by pointing fix_prompt_file at that file.
fix_prompt_file: .pipeline/prompts/review-guideline.md


extra_allowed_tools: "Bash(./build/host/clamiga:*)"
analyze_extra_tools: "Bash(make:*)"
implement_extra_tools: "Bash(make:*)"

# -- notes ----------------------------------------------------------------
# * The test stage runs with --network none, so no gems/quicklisp fetch — the
#   fast tier is a pure offline gcc build + unit tests.
# * The cross-compile / Amiga / FS-UAE tests cannot run here (no m68k toolchain
#   or emulator in the container); those stay on the host (make -f Makefile.cross).
